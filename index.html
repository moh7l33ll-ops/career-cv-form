<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAREER CV - Job Match Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #2d8a4e 50%, #3d9b5f 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            border: 3px solid #c9a84c;
            position: relative;
        }
        
        .lang-switch {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .lang-switch button {
            width: auto;
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #c9a84c;
            background: white;
            color: #1a5f2a;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', 'Cairo', sans-serif;
        }
        
        .lang-switch button.active {
            background: linear-gradient(135deg, #1a5f2a, #c9a84c);
            color: white;
            border-color: transparent;
        }
        
        .lang-switch button:hover:not(.active) {
            background: #f0fdf4;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #c9a84c;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
        }
        
        .logo h1 {
            color: #1a5f2a;
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .logo p {
            color: #c9a84c;
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #1a5f2a;
            font-weight: 700;
            font-size: 1.1em;
        }
        
        input[type="email"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            color: #1e293b;
            font-size: 1em;
            font-family: 'Poppins', 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        
        input:focus,
        textarea:focus {
            border-color: #c9a84c;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
            outline: none;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, #1a5f2a, #c9a84c);
            color: white;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', 'Cairo', sans-serif;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(201, 168, 76, 0.4);
        }
        
        .loading, .success {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        
        .loading {
            background: #dcfce7;
            color: #1a5f2a;
        }
        
        .success {
            background: #dcfce7;
            color: #166534;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #c9a84c;
        }
        
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', 'Cairo', sans-serif;
            text-decoration: none;
            margin-bottom: 15px;
        }
        
        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(37, 211, 102, 0.4);
        }
        
        .whatsapp-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        .region-text {
            color: #1a5f2a;
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .footer .legal {
            color: #94a3b8;
            font-size: 0.8em;
            margin-top: 10px;
        }
        
        .social-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .social-links a {
            color: #1a5f2a;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .social-links a:hover {
            color: #c9a84c;
        }
        
        [dir="rtl"] body {
            font-family: 'Cairo', 'Poppins', sans-serif;
        }
        
        [dir="rtl"] .lang-switch {
            left: auto;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="ar">العربية</button>
        </div>
        
        <div class="logo">
            <img src="sama.jpg" alt="Career CV Logo">
            <h1>CAREER CV</h1>
            <p data-i18n="title">Job Match Report</p>
        </div>
        
        <p class="subtitle" data-i18n="subtitle">
            CV & Recruitment Services ✍️<br>
            Helping you stand out professionally 🌟
        </p>
        
        <form id="cvForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="email" data-i18n="email_label">Email</label>
                <input type="email" id="email" name="customer_email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="job_description" data-i18n="job_label">Job Description</label>
                <textarea id="job_description" name="job_description" placeholder="Paste the job description here..." data-i18n-placeholder="job_placeholder" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="resume" data-i18n="resume_label">Upload Resume (PDF/DOCX)</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
            </div>
            
            <button type="submit" class="submit-btn" data-i18n="submit_btn">Generate Report</button>
            
            <div class="loading" id="loading" data-i18n="loading">
                ⏳ Analyzing your resume... Please wait
            </div>
            
            <div class="success" id="success" data-i18n="success">
                ✅ The report has been sent to your email!
            </div>
        </form>
        
        <div class="footer">
            <a href="https://wa.me/971545136410" target="_blank" class="whatsapp-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                <span data-i18n="whatsapp">Send Message</span>
            </a>
            
            <div class="region-text" data-i18n="region">Serving clients across the Middle East</div>
            
            <div class="legal">
                CR: 30802 | TRN: 773-323-384
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://www.facebook.com/profile.php?id=61571549710838" target="_blank">Facebook</a>
            <a href="https://www.instagram.com/career__cv/" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Job Match Report",
                subtitle: "CV & Recruitment Services ✍️<br>Helping you stand out professionally 🌟",
                email_label: "Email",
                job_label: "Job Description",
                job_placeholder: "Paste the job description here...",
                resume_label: "Upload Resume (PDF/DOCX)",
                submit_btn: "Generate Report",
                loading: "⏳ Analyzing your resume... Please wait",
                success: "✅ The report has been sent to your email!",
                whatsapp: "Send Message",
                region: "Serving clients across the Middle East"
            },
            ar: {
                title: "تقرير مطابقة الوظيفة",
                subtitle: "خدمات السيرة الذاتية والتوظيف ✍️<br>نساعدك في الظهور بشكل احترافي 🌟",
                email_label: "البريد الإلكتروني",
                job_label: "وصف الوظيفة",
                job_placeholder: "الصق وصف الوظيفة هنا...",
                resume_label: "رفع السيرة الذاتية (PDF/DOCX)",
                submit_btn: "إنشاء التقرير",
                loading: "⏳ جاري تحليل سيرتك الذاتية... الرجاء الانتظار",
                success: "✅ تم إرسال التقرير إلى بريدك الإلكتروني!",
                whatsapp: "إرسال رسالة",
                region: "نخدم عملاءنا في جميع أنحاء الشرق الأوسط"
            }
        };

        function setLanguage(lang) {
            const html = document.documentElement;
            const t = translations[lang];
            
            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.innerHTML = t[key];
                }
            });
            
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) {
                    el.placeholder = t[key];
                }
            });
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.getAttribute('data-lang'));
            });
        });

        setLanguage('en');

        document.getElementById('cvForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const loading = document.getElementById('loading');
    const success = document.getElementById('success');
    const button = document.querySelector('.submit-btn');
    
    loading.style.display = 'block';
    success.style.display = 'none';
    button.disabled = true;
    
    const formData = new FormData(this);
    
    try {
        const response = await fetch('https://n8n.srv1531563.hstgr.cloud/webhook/career-cv-job-match', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        loading.style.display = 'none';
        
        if (result.status === 'success' || response.ok) {
            success.style.display = 'block';
            // Clear form after success
            this.reset();
        } else {
            alert('Error: ' + (result.message || 'Something went wrong'));
        }
        
        button.disabled = false;
        
    } catch (error) {
        loading.style.display = 'none';
        alert('Error: ' + error.message);
        button.disabled = false;
    }
});
                
                loading.style.display = 'none';
                success.style.display = 'block';
                button.disabled = false;
                
            } catch (error) {
                loading.style.display = 'none';
                alert('Error: ' + error.message);
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
