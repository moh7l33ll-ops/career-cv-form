<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career CV - تقرير مطابقة الوظيفة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #3b82f6;
        }
        
        .logo h1 {
            color: #1e3a8a;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #64748b;
            font-size: 1.1em;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #1e3a8a;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        input[type="email"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            color: #1e293b;
            font-size: 1em;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }
        
        input:focus,
        textarea:focus {
            border-color: #3b82f6;
            outline: none;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }
        
        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .loading, .success {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        
        .loading {
            background: #dbeafe;
            color: #1e3a8a;
        }
        
        .success {
            background: #dcfce7;
            color: #166534;
        }
        
        .social-links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .social-links a {
            color: #64748b;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9em;
        }
        
        .social-links a:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo">
            <img src="sama.jpg" alt="Career CV Logo">
            <h1>Career CV</h1>
            <p>تقرير مطابقة الوظيفة</p>
        </div>
        
        <p class="subtitle">احصل على تحليل احترافي لمطابقة سيرتك الذاتية مع الوظيفة</p>
        
        <form id="cvForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="customer_email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="job_description">وصف الوظيفة</label>
                <textarea id="job_description" name="job_description" placeholder="الصق وصف الوظيفة هنا..." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="resume">رفع السيرة الذاتية (PDF/DOCX)</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
            </div>
            
            <button type="submit">إنشاء التقرير</button>
            
            <div class="loading" id="loading">
                ⏳ جاري تحليل سيرتك الذاتية... الرجاء الانتظار
            </div>
            
            <div class="success" id="success">
                ✅ تم إرسال التقرير إلى بريدك الإلكتروني!
            </div>
        </form>
        
        <div class="social-links">
            <a href="https://www.facebook.com/profile.php?id=61571549710838" target="_blank">Facebook</a>
            <a href="https://www.instagram.com/career__cv/" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        document.getElementById('cvForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const success = document.getElementById('success');
            const button = document.querySelector('button');
            
            loading.style.display = 'block';
            success.style.display = 'none';
            button.disabled = true;
            
            const formData = new FormData(this);
            
            try {
                await fetch('https://n8n.srv1531563.hstgr.cloud/webhook/career-cv-job-match', {
                    method: 'POST',
                    body: formData
                });
                
                loading.style.display = 'none';
                success.style.display = 'block';
                button.disabled = false;
                
            } catch (error) {
                loading.style.display = 'none';
                alert('خطأ: ' + error.message);
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
